name: Build RustDesk Client (Final v3)

on:
  workflow_dispatch:
    inputs:
      config_json:
        description: 'Configuration JSON'
        required: true
        type: string
      executable_name:
        description: 'Executable name'
        required: true
        type: string
        default: 'rustdesk-custom'
      rustdesk_branch:
        description: 'RustDesk branch'
        required: false
        type: string
        default: 'master'
      target_arch:
        description: 'Target architecture'
        required: false
        type: choice
        options:
          - x86_64
          - aarch64
        default: 'x86_64'
      enable_portable:
        description: 'Enable portable mode'
        required: false
        type: boolean
        default: false
      create_installer:
        description: 'Create installer'
        required: false
        type: boolean
        default: true
      enable_debug:
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false

env:
  RUST_VERSION: 1.75
  LLVM_VERSION: 15.0
  VCPKG_COMMIT_ID: 6f29f12e82a8293156836ad81cc9bf5af41fe836

jobs:
  build-windows:
    name: Build RustDesk for Windows
    runs-on: windows-2022
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Checkout RustDesk
      uses: actions/checkout@v4
      with:
        repository: rustdesk/rustdesk
        ref: ${{ inputs.rustdesk_branch }}
        submodules: recursive
        path: rustdesk

    - name: Install LLVM and Clang
      uses: KyleMayes/install-llvm-action@v1
      with:
        version: ${{ env.LLVM_VERSION }}

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        targets: x86_64-pc-windows-msvc
        components: "rustfmt"
        
    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: windows-2022
        workspaces: "rustdesk -> target"
        
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: C:\vcpkg
        vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
        doNotCache: false
        
    - name: Install system dependencies
      shell: powershell
      run: |
        choco install nsis -y --no-progress
        
    - name: Setup vcpkg environment
      shell: powershell
      run: |
        $source = "$env:GITHUB_WORKSPACE\vcpkg.json"
        $dest = "$env:GITHUB_WORKSPACE\rustdesk\vcpkg.json"
        if (Test-Path $source) {
            Copy-Item $source $dest -Force
        } else {
            Write-Host "Warning: vcpkg.json not found in root, using default"
        }
        
    - name: Install vcpkg dependencies
      shell: powershell
      run: |
        cd "$env:GITHUB_WORKSPACE\rustdesk"
        & "C:\vcpkg\vcpkg.exe" install --triplet x64-windows-static --x-install-root="C:\vcpkg\installed"
        
    - name: Apply configuration
      shell: powershell
      run: |
        cd "$env:GITHUB_WORKSPACE\rustdesk"
        New-Item -Path "src\ui" -ItemType Directory -Force | Out-Null
        
        $inputJson = '${{ inputs.config_json }}'
        $inputJson | Out-File -FilePath "src\ui\config.json" -Encoding UTF8
        
        $config = $inputJson | ConvertFrom-Json
        
        $rustConfig = "// Auto-generated configuration`n"
        $rustConfig += "pub const RENDEZVOUS_SERVER: &str = `"$($config.server.RENDEZVOUS_SERVER)`";`n"
        $rustConfig += "pub const RELAY_SERVER: &str = `"$($config.server.RELAY_SERVER)`";`n"
        $rustConfig += "pub const API_SERVER: &str = `"$($config.server.API_SERVER)`";`n"
        $rustConfig += "pub const KEY: &str = `"$($config.server.RS_PUB_KEY)`";`n"
        $rustConfig += "pub const PRODUCT_NAME: &str = `"$($config.branding.PRODUCT_NAME)`";`n"
        $rustConfig += "pub const APP_NAME: &str = `"$($config.branding.APP_NAME)`";"
        
        $rustConfig | Out-File -FilePath "src\config.rs" -Encoding UTF8

    - name: Generate inline module
      shell: powershell
      run: |
        cd "$env:GITHUB_WORKSPACE\rustdesk"
        New-Item -Path "src\ui" -ItemType Directory -Force | Out-Null
        $c = "pub fn get_index() -> String { r#`"<html><body><h1>RustDesk</h1></body></html>`"#.to_string() }`n"
        $c += "pub fn get_remote() -> String { r#`"<html><body><h1>Remote</h1></body></html>`"#.to_string() }`n"
        $c += "pub fn get_install() -> String { r#`"<html><body><h1>Install</h1></body></html>`"#.to_string() }`n"
        $c += "pub fn get_chatbox() -> String { r#`"<html><body><h1>Chat</h1></body></html>`"#.to_string() }`n"
        $c += "pub fn get_cm() -> String { r#`"<html><body><h1>CM</h1></body></html>`"#.to_string() }`n"
        $c = "// Inline module`n#[inline]`n" + $c
        Set-Content -Path "src\ui\inline.rs" -Value $c -Encoding UTF8

    - name: Build RustDesk
      shell: powershell
      run: |
        cd "$env:GITHUB_WORKSPACE\rustdesk"
        $env:VCPKG_ROOT = "C:\vcpkg"
        $env:LIBCLANG_PATH = "$env:PROGRAMFILES\LLVM\bin"
        $env:RUSTFLAGS = "-C target-feature=+crt-static"
        if ("${{ inputs.enable_debug }}" -eq "true") {
          cargo build --features inline
        } else {
          cargo build --release --features inline
        }

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rustdesk-client-${{ inputs.executable_name }}
        path: |
          rustdesk/target/release/*.exe
          rustdesk/target/debug/*.exe
